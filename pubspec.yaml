name: zhishouwang
description: 智收网 App
publish_to: 'none'
version: 0.31.1+32

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"
  adaptive_icon_background: "#D97757"
  adaptive_icon_foreground: "icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
